name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared types
        run: npm run build --workspace=packages/shared

      - name: Typecheck server
        run: npx --workspace=packages/server tsc --noEmit

      - name: Typecheck web
        run: npx --workspace=packages/web tsc --noEmit

      - name: Check for type drift
        run: |
          # Ensure no server/web file re-defines types that should come from @flightdeck/shared
          ! grep -rn "export type AgentStatus = " packages/server/src/ packages/web/src/ --include="*.ts" | grep -v "from '@flightdeck/shared'" | grep -v "node_modules" || { echo "ERROR: AgentStatus defined outside @flightdeck/shared"; exit 1; }
          ! grep -rn "export type DagTaskStatus = " packages/server/src/ packages/web/src/ --include="*.ts" | grep -v "from '@flightdeck/shared'" | grep -v "node_modules" || { echo "ERROR: DagTaskStatus defined outside @flightdeck/shared"; exit 1; }
          ! grep -rn "export type DelegationStatus = " packages/server/src/ packages/web/src/ --include="*.ts" | grep -v "from '@flightdeck/shared'" | grep -v "node_modules" || { echo "ERROR: DelegationStatus defined outside @flightdeck/shared"; exit 1; }

      - name: Unit tests with coverage
        run: npm run test:coverage --workspace=packages/server

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: packages/server/coverage/lcov.info
          flags: server
          fail_ci_if_error: false
